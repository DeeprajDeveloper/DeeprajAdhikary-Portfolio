<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Deepraj Adhikary — Business Systems Analyst portfolio" />
    <title>Deepraj Adhikary</title>
    <script>
      (function () {
        var stored = localStorage.getItem('portfolio-theme');
        var theme =
          stored ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=Stack+Sans+Notch:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
